<!doctype html>
<html lang="vi" data-bs-theme="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>CMS01 - Quản lý Kho & Vận chuyển - Admin Login</title>
    <link rel="shortcut icon" href="http://localhost/CMS01/public/material/assets/images/favicon.ico">
    <link href="http://localhost/CMS01/public/material/assets/css/bootstrap.min.css" rel="stylesheet">
    <link href="http://localhost/CMS01/public/material/assets/css/icons.min.css" rel="stylesheet">
    <link href="http://localhost/CMS01/public/material/assets/css/app.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .auth-page-wrapper { min-height: 100vh; display: flex; align-items: center; background: linear-gradient(135deg, #405189 0%, #0ab39c 100%); }
        .auth-card { border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); border: none; }
    </style>
</head>
<body>
    <div class="auth-page-wrapper">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-5 col-lg-4">
                    <div class="card auth-card">
                        <div class="card-body p-4">
                            <div class="text-center mb-4">
                                <div class="avatar-md mx-auto mb-3">
                                    <div class="avatar-title bg-primary-subtle text-primary rounded-circle fs-24">
                                        <i class="ri-truck-line"></i>
                                    </div>
                                </div>
                                <h4 class="mb-1"><b>CMS01</b></h4>
                                <p class="text-muted fs-13">Quản lý Kho & Vận chuyển</p>
                            </div>

                            <div id="alert-box"></div>

                            <form id="form-login">
                                <input type="hidden" name="csrf_token" value="c132c6abbb4285e96335ece1354134608ab3904b01f9a651dcbcbe9ecfce2cb0">
                                <input type="hidden" name="request_name" value="login">

                                <div class="mb-3">
                                    <label class="form-label" for="username">Tên đăng nhập</label>
                                    <div class="position-relative">
                                        <input type="text" class="form-control" id="username" name="username" placeholder="Nhập tên đăng nhập" required autofocus>
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label" for="password">Mật khẩu</label>
                                    <div class="position-relative">
                                        <input type="password" class="form-control" id="password" name="password" placeholder="Nhập mật khẩu" required>
                                        <button class="btn btn-link position-absolute end-0 top-0 text-decoration-none text-muted" type="button" id="toggle-password">
                                            <i class="ri-eye-fill align-middle"></i>
                                        </button>
                                    </div>
                                </div>

                                <div class="mt-4">
                                    <button type="submit" class="btn btn-primary w-100" id="btn-login">
                                        <span id="btn-text">Đăng nhập</span>
                                        <span id="btn-loading" style="display:none;">
                                            <span class="spinner-border spinner-border-sm" role="status"></span> Đang xử lý...                                        </span>
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                    <div class="text-center mt-3">
                        <p class="text-white-50 fs-12">&copy; 2026 CMS01 v1.0</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="http://localhost/CMS01/public/material/assets/libs/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script>
    $('#toggle-password').on('click', function(){
        var input = document.getElementById('password');
        input.type = input.type === 'password' ? 'text' : 'password';
    });

    $('#form-login').on('submit', function(e){
        e.preventDefault();
        $('#btn-text').hide();
        $('#btn-loading').show();
        $('#btn-login').prop('disabled', true);

        $.ajax({
            url: 'http://localhost/CMS01/ajaxs/admin/login.php',
            type: 'POST',
            data: $(this).serialize(),
            dataType: 'json',
            success: function(res){
                if(res.status == 'success'){
                    window.location.href = res.redirect || 'http://localhost/CMS01/admin/home';
                } else {
                    $('#alert-box').html('<div class="alert alert-danger alert-dismissible fade show">' + res.msg + '<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>');
                }
            },
            error: function(){
                $('#alert-box').html('<div class="alert alert-danger">Lỗi kết nối. Vui lòng thử lại.</div>');
            },
            complete: function(){
                $('#btn-text').show();
                $('#btn-loading').hide();
                $('#btn-login').prop('disabled', false);
            }
        });
    });
    </script>
</body>
</html>
